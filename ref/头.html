<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline Hanzi Animation - 头</title>
  <style>
    :root {
      color-scheme: light;
      --bg-a: #f4efe8;
      --bg-b: #e0d1c2;
      --panel: rgba(255, 255, 255, 0.78);
      --text: #2b221d;
      --accent: #8c5a3c;
      --shadow: rgba(43, 34, 29, 0.14);
    }

    html, body { height: 100%; margin: 0; }
    body {
      display: grid;
      place-items: center;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.84), transparent 40%),
        linear-gradient(135deg, var(--bg-a), var(--bg-b));
    }

    .card {
      width: min(92vw, 760px);
      padding: 24px;
      border-radius: 24px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 50px var(--shadow);
      border: 1px solid rgba(43, 34, 29, 0.12);
    }

    .top {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 46px);
      letter-spacing: 0.06em;
    }

    p {
      margin: 6px 0 0;
      line-height: 1.55;
      color: rgba(43, 34, 29, 0.76);
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(140, 90, 60, 0.24);
    }

    .stage {
      position: relative;
      aspect-ratio: 1 / 1;
      width: min(100%, 560px);
      margin: 0 auto;
      display: grid;
      place-items: center;
    }

    .grid {
      position: absolute;
      inset: 6% 6%;
      border-radius: 18px;
      background:
        linear-gradient(to right, transparent calc(50% - 0.5px), rgba(140,90,60,0.10) calc(50% - 0.5px), rgba(140,90,60,0.10) calc(50% + 0.5px), transparent calc(50% + 0.5px)),
        linear-gradient(to bottom, transparent calc(50% - 0.5px), rgba(140,90,60,0.10) calc(50% - 0.5px), rgba(140,90,60,0.10) calc(50% + 0.5px), transparent calc(50% + 0.5px)),
        linear-gradient(to right, transparent calc(33.333% - 0.5px), rgba(140,90,60,0.08) calc(33.333% - 0.5px), rgba(140,90,60,0.08) calc(33.333% + 0.5px), transparent calc(33.333% + 0.5px)),
        linear-gradient(to right, transparent calc(66.666% - 0.5px), rgba(140,90,60,0.08) calc(66.666% - 0.5px), rgba(140,90,60,0.08) calc(66.666% + 0.5px), transparent calc(66.666% + 0.5px)),
        linear-gradient(to bottom, transparent calc(33.333% - 0.5px), rgba(140,90,60,0.08) calc(33.333% - 0.5px), rgba(140,90,60,0.08) calc(33.333% + 0.5px), transparent calc(33.333% + 0.5px)),
        linear-gradient(to bottom, transparent calc(66.666% - 0.5px), rgba(140,90,60,0.08) calc(66.666% - 0.5px), rgba(140,90,60,0.08) calc(66.666% + 0.5px), transparent calc(66.666% + 0.5px));
      border: 1px solid rgba(43, 34, 29, 0.08);
    }

    .glyph {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .stroke-layer {
      fill: none;
      stroke: #2d241f;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 48;
      stroke-dasharray: var(--len);
      stroke-dashoffset: var(--len);
      animation: trace var(--stroke-duration) linear forwards;
      animation-delay: var(--delay);
    }

    @keyframes trace {
      to { stroke-dashoffset: 0; }
    }

    .note {
      margin-top: 12px;
      font-size: 14px;
      color: rgba(43, 34, 29, 0.66);
    }

    .sequence {
      margin-top: 10px;
      font-size: 13px;
      color: rgba(43, 34, 29, 0.74);
      letter-spacing: 0.03em;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="top">
      <div>
        <h1>头</h1>
        <p>Offline stroke animation using upstream hanzi-writer-data.</p>
      </div>
      <div class="controls">
        <button id="replay" type="button">Replay</button>
      </div>
    </div>

    <div class="stage">
      <div class="grid" aria-hidden="true"></div>
      <svg class="glyph" viewBox="0 0 1024 1024" aria-label="头 stroke animation" role="img"></svg>
    </div>

    <div class="note">
      Exact upstream stroke data from <code>hanzi-writer-data</code>.
    </div>
    <div class="sequence">
      5 strokes, traced sequentially with no pause between strokes.
    </div>
  </main>

  <script>
    (function () {
      const replay = document.getElementById('replay');
      const svg = document.querySelector('.glyph');
      const strokeSpeed = 500;
      const strokeGap = 0;

      const strokeData = {
        medians: [
          [[329, 700], [412, 650], [436, 624]],
          [[262, 555], [356, 497], [388, 456]],
          [[124, 322], [182, 312], [388, 345], [805, 386], [857, 379], [898, 364]],
          [[514, 770], [551, 748], [570, 726], [574, 705], [534, 410], [518, 339], [488, 256], [442, 177], [367, 109], [280, 60], [207, 33], [174, 27]],
          [[607, 234], [700, 162], [765, 101], [790, 69], [808, 19]]
        ]
      };

      function clearSvg() {
        while (svg.firstChild) svg.removeChild(svg.firstChild);
      }

      function makePath(d, className) {
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', d);
        path.setAttribute('class', className);
        return path;
      }

      function medianPath(points) {
        const [first, ...rest] = points;
        return `M ${first[0]} ${first[1]} ${rest.map(([x, y]) => `L ${x} ${y}`).join(' ')}`;
      }

      function animate() {
        clearSvg();

        const frame = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        frame.setAttribute('transform', 'translate(30 20)');
        svg.appendChild(frame);

        const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        group.setAttribute('transform', 'translate(0 1024) scale(0.95 -0.95)');
        frame.appendChild(group);

        let currentTime = 0;

        strokeData.medians.forEach((points) => {
          const stroke = makePath(medianPath(points), 'stroke-layer');
          const length = stroke.getTotalLength();
          const duration = Math.max(length / strokeSpeed, 0.2);
          stroke.style.setProperty('--len', `${length}`);
          stroke.style.setProperty('--stroke-duration', `${duration}s`);
          stroke.style.setProperty('--delay', `${currentTime}s`);
          group.appendChild(stroke);
          currentTime += duration + strokeGap;
        });
      }

      function restartAnimation() {
        svg.style.animation = 'none';
        svg.getBoundingClientRect();
        svg.style.animation = '';
        animate();
      }

      replay.addEventListener('click', restartAnimation);
      animate();
    })();
  </script>
</body>
</html>
